<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#4f46e5" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#4f46e5" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Outer Circle with Tech Accent -->
  <circle cx="256" cy="256" r="240" fill="url(#gradient)" filter="url(#shadow)" />
  
  <!-- Inner Ring representing Automation & Loop -->
  <circle cx="256" cy="256" r="200" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="8" stroke-dasharray="20 10" />

  <!-- Code Brackets & Automation Gear/Bolt Emblem -->
  <!-- Left Bracket < -->
  <path d="M 170 190 L 110 256 L 170 322" fill="none" stroke="#ffffff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Right Bracket > -->
  <path d="M 342 190 L 402 256 L 342 322" fill="none" stroke="#ffffff" stroke-width="32" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Central Automation Spark/Lightning/Data Nodes -->
  <!-- We'll put a beautiful central lightning/node paths depicting fast automation -->
  <path d="M 280 140 L 210 260 L 290 260 L 232 372" fill="none" stroke="#38bdf8" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" />
  
  <!-- Nodes representing Data Flows -->
  <circle cx="280" cy="140" r="14" fill="#ffffff" />
  <circle cx="232" cy="372" r="14" fill="#ffffff" />
</svg>
